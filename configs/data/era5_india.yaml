# Stage 1 + 2 data configuration.
source: weatherbench2          # cloud-hosted, pre-regridded ERA5
resolution_deg: 5.625          # global grid = 32 lat x 64 lon

# WeatherBench2 ERA5, 5.625 deg = 64x32 (no poles), 6-hourly, 1959-2023.
zarr_path: "gs://weatherbench2/datasets/era5/1959-2023_01_10-6h-64x32_equiangular_conservative.zarr"

# REAL WB2 variable names (verified against the data guide + the store itself).
# Targets are predicted; predictors are input-only context (remote S2S signal).
variables:
  targets:
    surface:
      - 2m_temperature                  # Kelvin
      - total_precipitation_24hr        # accumulated metres/24h (NOT a rate)
  predictors:
    surface:
      - sea_surface_temperature                 # ocean memory (NaN over land)
      # mean_top_net_long_wave_radiation_flux dropped: confirmed 100% NaN across
      # the ENTIRE WB2 store at this resolution (verified, not a pipeline bug --
      # see Phase-A eval layer session notes). Re-add if/when WB2 fixes it upstream.
    levels:                             # variable -> pressure levels (hPa)
      geopotential: [500]
      u_component_of_wind: [850, 200]   # MJO / monsoon wind fingerprint

# Optional: restrict years during development for fast first runs (null = all).
dev_years: null

# Input domain is GLOBAL (do not crop — teleconnections). Eval is the India box.
input_domain: global
eval_box:                      # lat/lon bounds for scoring only
  lat_min: 5.0
  lat_max: 40.0
  lon_min: 65.0
  lon_max: 100.0

# Temporal: weekly means, direct prediction of weeks 1-6.
lead_weeks: [1, 2, 3, 4, 5, 6]
history_weeks: 2               # weeks of past state fed as input

# SST teleconnection indices (Phase-C lever b): low-dim ENSO/IOD boundary signal as
# globally-broadcast channels, from the train-standardized SST anomaly field.
#   nino34 = ENSO (Nino 3.4);  dmi = IOD Dipole Mode Index (West minus East)
sst_indices: []   # ADR-0006: SST indices = null lever (no CI-distinguishable gain), OFF by default
sst_index_lags_weeks: [0]   # init-time; extend (e.g. [0, 8]) for index tendency

# Splits by year block. Stats (climatology, norm) come from TRAIN ONLY.
splits:
  train: [1979, 2012]
  val:   [2013, 2017]
  test:  [2018, 2023]
  embargo_weeks: 4             # gap between blocks to kill autocorrelation leakage

# Denser train/val sampling: stride in days for daily_init_weekly_windows.
# 1 => every calendar day is an init date (~7x more samples than W-MON).
train_stride_days: 1

# Precip is skewed/bounded-at-zero: transform before normalizing.
precip_transform: log1p

paths:
  raw: /Datastorage/scdlds_bharat/s2s/data/raw
  processed: /Datastorage/scdlds_bharat/s2s/data/processed
