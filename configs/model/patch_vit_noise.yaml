# Fix 6 (C3) attribution control: patch-ViT WITH a stochastic member mechanism,
# trained with fair-CRPS. Same objective as the Stage-B Mosaic; the question is
# whether the CRPSS (vs prob AND trend climatology) is the OBJECTIVE or the BACKBONE.
#
# Param count is matched to the slim Mosaic (~3.5-3.7M): embed_dim=224/depth=6
# gives ~3.77M (verify via tests/test_patchvit_noise.py::test_param_count_matches_mosaic_band).
name: patch_vit
patch_size: 2                  # 32x64 -> 16x32 = 512 tokens
embed_dim: 224                 # tuned to match Mosaic slim param budget
depth: 6
num_heads: 8                   # head_dim = 224/8 = 28
mlp_ratio: 4.0
drop_rate: 0.1
noise_dim: 8                   # >0 activates the FiLM member mechanism (matches Mosaic noise_dim)
# in/out channels derived from the data config at build time
